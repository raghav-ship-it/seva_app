<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Task Detail - Wireframe</title>
  <style>
    :root {
      /* Wireframe Palette: Desaturated Human/Approachable */
      --bg:      oklch(98% 0 0);
      --surface: oklch(100% 0 0);
      --fg:      oklch(20% 0 0);
      --muted:   oklch(60% 0 0);
      --border:  oklch(90% 0 0);
      --accent:  oklch(40% 0 0);
      
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      
      --font-display: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-body:    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      line-height: 1.5;
      padding: 0;
      margin: 0;
      display: flex;
      justify-content: center;
    }

    .detail-container {
      background: var(--surface);
      width: 100%;
      max-width: 600px;
      min-height: 100vh;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 10;
    }

    .close-btn {
      font-size: 24px;
      cursor: pointer;
      color: var(--muted);
    }

    .delete-btn {
      width: 24px;
      height: 24px;
      border: 1.5px solid var(--muted);
      border-radius: 4px;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .scroll-content {
      flex: 1;
      padding: 16px;
    }

    .title-field {
      font-size: 20px;
      font-weight: 700;
      border: 0;
      width: 100%;
      margin-bottom: 8px;
      outline: none;
      background: transparent;
    }

    .description-field {
      font-size: 14px;
      color: var(--muted);
      border: 0;
      width: 100%;
      min-height: 60px;
      margin-bottom: 20px;
      outline: none;
      resize: none;
      background: transparent;
    }

    .section-box {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .status-dropdown {
      padding: 12px;
      background: var(--bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }

    .metadata-panel {
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .meta-label {
      color: var(--muted);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .meta-value {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .reminders-section {
      padding: 16px 0;
      border-top: 1px solid var(--border);
    }

    .reminders-header {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .reminder-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
      font-size: 13px;
    }

    .add-reminder {
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-top: 20px;
    }

    .tab {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      cursor: pointer;
    }

    .tab.active {
      color: var(--fg);
      border-bottom-color: var(--fg);
    }

    .activity-feed {
      padding: 12px 0;
    }

    .comment {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .avatar {
      width: 28px;
      height: 28px;
      background: var(--border);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .comment-bubble {
      background: var(--bg);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
    }

    .comment-input-area {
      position: sticky;
      bottom: 0;
      background: var(--surface);
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .comment-input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 14px;
      outline: none;
    }

    .attach-btn {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--muted);
      border-radius: 50%;
      transition: background 0.2s;
    }

    .attach-btn:hover {
      background: var(--bg);
      color: var(--fg);
    }
  </style>
</head>
<body>

  <div class="detail-container">
    <header style="padding: 12px 16px;">
      <div class="close-btn" onclick="history.back()">✕</div>
      <div class="delete-btn" style="width: 20px; height: 20px; font-size: 12px;">🗑️</div>
    </header>

    <div class="scroll-content">
      <input type="text" class="title-field" value="Complete Q2 Project Review" />
      <textarea class="description-field" placeholder="Add description / notes here...">Please ensure all numbers are double-checked before the final submission.</textarea>

      <div class="section-box">
        <div class="status-dropdown">
          <span>Status: Pending</span>
          <span>▾</span>
        </div>
      </div>

      <div class="section-box metadata-panel">
        <div class="meta-row">
          <div class="meta-label">@ Assignee</div>
          <div class="meta-value">@Sarah_Dev</div>
        </div>
        <div class="meta-row">
          <div class="meta-label"># Tags</div>
          <div class="meta-value">
            <span style="background: var(--bg); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); font-size: 11px;">Marketing</span>
            <span style="background: var(--bg); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); font-size: 11px;">Urgent</span>
          </div>
        </div>
        <div class="meta-row">
          <div class="meta-label">! Priority</div>
          <div class="meta-value">!1 High</div>
        </div>
        <div class="meta-row">
          <div class="meta-label">? Due Date</div>
          <div class="meta-value">June 15, 2026</div>
        </div>
      </div>

      <div class="reminders-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <div class="reminders-header" style="margin-bottom: 0;">Reminders</div>
          <button style="background: var(--bg); border: 1.5px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 4px;">
            <span>🔔</span> + Add
          </button>
        </div>
        <div class="reminder-item">
          <span>June 15, 2026 @ 9:00 AM</span>
          <span style="color: var(--muted); cursor: pointer;">✕</span>
        </div>
      </div>

      <div class="tabs">
        <div class="tab active">Activity Feed</div>
      </div>

      <div class="activity-feed" id="activityFeed">
        <!-- Unified Feed Content -->
      </div>
    </div>

    <div class="comment-input-area">
      <div class="attach-btn" title="Add Attachment" onclick="simulateUpload()">📎</div>
      <input type="text" class="comment-input" id="commentInput" placeholder="Write a comment..." />
      <button onclick="postComment()" style="background: var(--fg); color: var(--surface); border: 0; padding: 6px 16px; border-radius: 20px; font-weight: 600; font-size: 13px; cursor: pointer;">Send</button>
    </div>
  </div>

  <script>
    // State
    const feedData = [
      { id: 1, type: 'comment', user: 'UserA', text: 'Finished the draft.', time: '2h ago' },
      { id: 2, type: 'history', text: 'Sarah_Dev changed status to Pending', time: '1.5h ago' },
      { id: 3, type: 'comment', user: 'AdminB', text: 'Please double check the numbers.', time: '1h ago' },
      { id: 4, type: 'history', text: 'AdminB updated description', time: '45m ago' },
      { id: 5, type: 'attachment', user: 'Sarah_Dev', text: 'Uploaded Document_v2.pdf', filename: 'Document_v2.pdf', time: '30m ago' }
    ];

    function renderFeed() {
      const feedEl = document.getElementById('activityFeed');
      feedEl.innerHTML = feedData.map(item => {
        if (item.type === 'comment') {
          return `
            <div class="comment" style="padding: 12px 16px; border-bottom: 1px solid var(--border);">
              <div style="display: flex; gap: 10px;">
                <div class="avatar"></div>
                <div class="comment-info">
                  <div style="font-weight: 700; font-size: 11px; margin-bottom: 2px;">${item.user} <span style="font-weight: 400; color: var(--muted);">• ${item.time}</span></div>
                  <div class="comment-bubble">${item.text}</div>
                </div>
              </div>
            </div>
          `;
        } else if (item.type === 'history') {
          return `
            <div class="history-item" style="padding: 8px 16px; border-bottom: 1px solid var(--border); background: oklch(99% 0 0); display: flex; align-items: center; gap: 8px;">
              <span style="font-size: 11px; color: var(--muted);">⚙️</span>
              <span style="font-size: 12px; color: var(--fg);">${item.text}</span>
              <span style="font-size: 10px; color: var(--muted); margin-left: auto;">${item.time}</span>
            </div>
          `;
        } else if (item.type === 'attachment') {
          return `
            <div class="attachment-item" style="padding: 12px 16px; border-bottom: 1px solid var(--border);">
               <div style="display: flex; gap: 10px;">
                <div class="avatar"></div>
                <div class="comment-info">
                  <div style="font-weight: 700; font-size: 11px; margin-bottom: 2px;">${item.user} <span style="font-weight: 400; color: var(--muted);">• ${item.time}</span></div>
                  <div style="font-size: 12px; margin-bottom: 6px;">${item.text}</div>
                  <div style="display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; background: var(--bg);">
                    📎 ${item.filename}
                  </div>
                </div>
              </div>
            </div>
          `;
        }
      }).join('');
    }

    function postComment() {
      const input = document.getElementById('commentInput');
      const text = input.value.trim();
      if (!text) return;

      feedData.push({
        id: Date.now(),
        type: 'comment',
        user: 'Current User',
        text: text,
        time: 'Just now'
      });

      input.value = '';
      renderFeed();
      scrollFeed();
    }

    function simulateUpload() {
      const filename = prompt("Simulating upload. Enter filename:", "new_mockup.png");
      if (!filename) return;
      
      feedData.push({
        id: Date.now(),
        type: 'attachment',
        user: 'Current User',
        text: `Attached ${filename}`,
        filename: filename,
        time: 'Just now'
      });
      renderFeed();
      scrollFeed();
    }

    function scrollFeed() {
      const scrollContent = document.querySelector('.scroll-content');
      scrollContent.scrollTop = scrollContent.scrollHeight;
    }

    // Initial render
    renderFeed();
  </script>
</body>
</html>
