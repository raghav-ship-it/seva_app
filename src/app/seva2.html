<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Day - Wireframe</title>
  <style>
    :root {
      /* Wireframe Palette: Desaturated Human/Approachable */
      --bg:      oklch(98% 0 0);
      --surface: oklch(100% 0 0);
      --fg:      oklch(20% 0 0);
      --muted:   oklch(60% 0 0);
      --border:  oklch(90% 0 0);
      --accent:  oklch(40% 0 0);
      
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      
      --font-display: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-body:    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 100px;
    }

    header {
      padding: 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header-date {
      font-size: 14px;
      color: var(--muted);
    }

    .btn-clear {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    section {
      padding: 24px;
    }

    h2 {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      position: relative;
    }

    .task-check {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .task-info {
      flex: 1;
    }

    .task-title {
      font-weight: 600;
      font-size: 16px;
      display: block;
      margin-bottom: 4px;
    }

    .task-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .wireframe-icon {
      width: 14px;
      height: 14px;
      border: 1px solid currentColor;
      border-radius: 2px;
    }

    .priority-indicator {
      width: 4px;
      height: 100%;
      position: absolute;
      left: 0;
      top: 0;
      border-top-left-radius: var(--radius-md);
      border-bottom-left-radius: var(--radius-md);
      background: var(--border);
    }

    .priority-1 { background: var(--accent); }

    /* Suggestions Section */
    .suggestions-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .suggestion-card {
      background: var(--bg);
      border: 1px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .add-to-day {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 18px;
      font-weight: 700;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      text-decoration: none;
    }

    .nav-item.active {
      color: var(--fg);
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      border: 2.5px solid currentColor;
      border-radius: 8px;
    }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 96px;
      right: 24px;
      width: 56px;
      height: 56px;
      background: var(--fg);
      color: var(--surface);
      border-radius: 18px;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      cursor: pointer;
      z-index: 90;
      font-size: 24px;
      font-weight: 700;
    }

    /* Quick Add Bottom Sheet Mock */
    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top-left-radius: var(--radius-lg);
      border-top-right-radius: var(--radius-lg);
      padding: 24px;
      padding-bottom: 40px;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
      z-index: 200;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bottom-sheet.active {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 24px;
    }

    .quick-input {
      width: 100%;
      padding: 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 16px;
      margin-bottom: 12px;
      font-family: inherit;
    }

    .token-bar {
      display: flex;
      gap: 12px;
      color: var(--muted);
      font-weight: 600;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <h1>My Day</h1>
      <p class="header-date">Tuesday, June 15</p>
    </div>
    <button class="btn-clear">🗑️ Clear</button>
  </header>

  <main class="main-content">
    <section>
      <h2>☀️ My Day Tasks</h2>
      <div class="task-list">
        <!-- Task 1 -->
        <div class="task-card">
          <div class="priority-indicator priority-1"></div>
          <div class="task-check"></div>
          <div class="task-info">
            <span class="task-title">Complete Q2 Project Review</span>
            <div class="task-meta">
              <div class="meta-item"><span class="wireframe-icon"></span> #Work</div>
              <div class="meta-item"><span class="wireframe-icon"></span> Today</div>
              <div class="meta-item"><span class="wireframe-icon" style="border-radius: 50%; display: grid; place-items: center; font-size: 10px;">🔔</span> 5:00 PM</div>
            </div>
          </div>
          <div class="task-actions" style="margin-left: auto;">
             <div class="wireframe-icon" style="width: 28px; height: 28px; border-radius: 6px; display: grid; place-items: center; cursor: pointer;">🔔</div>
          </div>
        </div>

        <!-- Task 2 -->
        <div class="task-card">
          <div class="priority-indicator"></div>
          <div class="task-check"></div>
          <div class="task-info">
            <span class="task-title">Draft weekly meeting agenda</span>
            <div class="task-meta">
              <div class="meta-item"><span class="wireframe-icon"></span> #Admin</div>
              <div class="meta-item"><span class="wireframe-icon"></span> Today</div>
            </div>
          </div>
          <div class="task-actions" style="margin-left: auto;">
             <div class="wireframe-icon" style="width: 28px; height: 28px; border-radius: 6px; display: grid; place-items: center; cursor: pointer;">🔔</div>
          </div>
        </div>
      </div>
    </section>

    <section style="background: var(--surface); margin: 0 24px; border-radius: var(--radius-lg); border: 1px solid var(--border);">
      <h2>📅 Due Today</h2>
      <div class="suggestions-list">
        <div class="suggestion-card" style="position: relative; overflow: hidden;">
          <!-- Swipe Hint Overlay -->
          <div style="position: absolute; left: 0; top: 0; bottom: 0; width: 40px; background: oklch(90% 0 0); display: grid; place-items: center; font-size: 12px; font-weight: 800; color: var(--muted); border-right: 1px dashed var(--border);">→</div>
          
          <div class="task-info" style="margin-left: 48px;">
            <span class="task-title" style="font-size: 14px;">Update platform API links</span>
            <div style="font-size: 12px; color: var(--muted);">#Tech • !2 • <span style="font-style: italic;">Swipe right to add</span></div>
          </div>
          <div style="display: flex; gap: 8px; align-items: center;">
            <button style="background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px;">
              <span>🔔</span> Set Alarm
            </button>
            <div class="add-to-day">+</div>
          </div>
        </div>
        <div class="suggestion-card">
          <div class="task-info">
            <span class="task-title" style="font-size: 14px;">Submit weekly time logs</span>
            <div style="font-size: 12px; color: var(--muted);">#Admin • !4</div>
          </div>
          <div style="display: flex; gap: 8px; align-items: center;">
            <button style="background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px;">
              <span>🔔</span> Set Alarm
            </button>
            <div class="add-to-day">+</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="fab" onclick="document.getElementById('quick-add').classList.toggle('active')">+</div>

  <nav class="bottom-nav">
    <a href="#" class="nav-item active">
      <div class="nav-icon"></div>
      My Day
    </a>
    <a href="task-dashboard-wireframe.html" class="nav-item">
      <div class="nav-icon"></div>
      Tasks
    </a>
    <a href="#" class="nav-item">
      <div class="nav-icon"></div>
      Activity
    </a>
    <a href="#" class="nav-item">
      <div class="nav-icon"></div>
      Profile
    </a>
  </nav>

  <!-- Quick Add Mock -->
  <div class="bottom-sheet" id="quick-add">
    <div class="sheet-handle" onclick="document.getElementById('quick-add').classList.remove('active')"></div>
    <input type="text" class="quick-input" placeholder="Buy groceries #personal !1 ?tomorrow" autofocus />
    <div class="token-bar">
      <span>@</span>
      <span>#</span>
      <span>!</span>
      <span>?</span>
      <span>+</span>
      <span>*</span>
    </div>
  </div>

</body>
</html>
